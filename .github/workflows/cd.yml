name: Build and Deploy Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed


permissions:
  contents: write

jobs:
  build-deploy-javadoc:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Generate Javadoc for overlay
        working-directory: overlay
        run: mvn clean verify javadoc:javadoc allure:report

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p public
          
          cat > public/metrics.json <<EOF
          {
            "timestamp": $(date +%s)
          }
          EOF
          
          cp -r gh-pages/* public/
          cp -r overlay/target/reports/apidocs public/javadoc
          cp -r overlay/target/site/allure-maven-plugin public/allure

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true

  cleanup-merged-pr-pit:
    name: Cleanup merged PR PIT reports
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Checkout main for workflow scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Remove PIT reports for merged source branch
        env:
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          SAFE_BRANCH="${SOURCE_BRANCH//\//-}"
          export SAFE_BRANCH
          TARGET_DIR="pit/$SAFE_BRANCH"

          if [ -d "$TARGET_DIR" ]; then
            rm -rf "$TARGET_DIR"
          else
            echo "No PIT report directory to remove: $TARGET_DIR"
          fi

          REPORTS_FILE="mutation/reports.json"
          if [ -f "$REPORTS_FILE" ]; then
            python main-repo/.github/scripts/update_mutation_reports.py \
              --manifest "$REPORTS_FILE" \
              --remove-branch "$SAFE_BRANCH"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: remove PIT report for merged branch $SAFE_BRANCH"
          git push
