name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:4-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    outputs:
      pit_report: ${{ steps.publish-pit.outputs.pit_report }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build
        run: mvn --batch-mode --no-transfer-progress compile

      - name: Test
        run: mvn --batch-mode --no-transfer-progress test -Dintegration.tests=true
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672

      - name: Upload pit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-reports
          path: "**/target/pit-reports"
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*.xml"
          if-no-files-found: ignore

  publish-overlay-pit:
    name: Publish Overlay PIT report
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build-and-test
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download PIT report
        uses: actions/download-artifact@v4
        with:
          name: pit-reports
          path: ./overlay/target/pit-reports

      - name: Compute branch folder
        id: branch
        run: echo "safe_name=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build mutation reports manifest
        env:
          SAFE_BRANCH: ${{ steps.branch.outputs.safe_name }}
        run: |
          mkdir -p .mutation-manifest

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git show origin/gh-pages:mutation/reports.json > .mutation-manifest/reports.json 2>/dev/null || echo '{"reports": []}' > .mutation-manifest/reports.json
          else
            echo '{"reports": []}' > .mutation-manifest/reports.json
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path('.mutation-manifest/reports.json')
          safe_branch = os.environ['SAFE_BRANCH']
          report_url = f"../pit/{safe_branch}/overlay/target/pit-reports/index.html"

          with manifest_path.open('r', encoding='utf-8') as f:
              data = json.load(f)

          reports = data.get('reports', [])
          if not isinstance(reports, list):
              reports = []

          normalized = []
          for entry in reports:
              if isinstance(entry, dict) and isinstance(entry.get('name'), str) and isinstance(entry.get('url'), str):
                  normalized.append({'name': entry['name'], 'url': entry['url']})

          normalized = [entry for entry in normalized if entry['name'] != safe_branch]
          normalized.append({'name': safe_branch, 'url': report_url})
          normalized.sort(key=lambda entry: entry['name'].lower())

          with manifest_path.open('w', encoding='utf-8') as f:
              json.dump({'reports': normalized}, f, indent=2)
              f.write('\n')
          PY

      - name: Publish PIT report to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./overlay/target/pit-reports
          destination_dir: pit/${{ steps.branch.outputs.safe_name }}
          keep_files: true

      - name: Publish mutation reports manifest
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.mutation-manifest
          destination_dir: mutation
          keep_files: true
